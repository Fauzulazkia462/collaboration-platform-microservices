version: '3.9'

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: user_service
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
  redis:
    image: redis:7
    ports:
      - "6379:6379"
  user-service:
    build: .
    ports:
      - "8081:8081"
    depends_on:
      - postgres
      - redis