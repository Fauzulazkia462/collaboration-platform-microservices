services:

  user-service:
    build:
      context: ./springboot-user-service
    container_name: springboot-user-service
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/collaboration_platform
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      JWT_SECRET: 2dff20cfbd9ca6d9b17d06bea4904dc985cbca7a97ec73d78a1254dd6ea7ad63b271107bbc3e5f575b294eccc37a985c62f7a58f5f086f35298f9c5a8f35401e
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - backend-network

  project-service:
    build:
      context: ./nodejsexpress-project-service
    container_name: nodejs-project-service
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: collaboration_platform
      REDIS_HOST: redis
      REDIS_PORT: 6379
      #the same secret key as what the user service has
      JWT_SECRET: 2dff20cfbd9ca6d9b17d06bea4904dc985cbca7a97ec73d78a1254dd6ea7ad63b271107bbc3e5f575b294eccc37a985c62f7a58f5f086f35298f9c5a8f35401e
      KAFKA_BROKER: kafka:9092
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - backend-network

  activity-service:
    build:
      context: ./django-activity-service
    container_name: django-activity-service
    ports:
      - "8000:8000"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: collaboration_platform
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_BROKER: kafka:9092
      #the same secret key as what the user service has
      JWT_SECRET: 2dff20cfbd9ca6d9b17d06bea4904dc985cbca7a97ec73d78a1254dd6ea7ad63b271107bbc3e5f575b294eccc37a985c62f7a58f5f086f35298f9c5a8f35401e
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
    networks:
      - backend-network
  
  notification-service:
    build:
      context: ./laravel-notification-service
    container_name: laravel-notification-service
    volumes:
      - ./laravel-notification-service:/var/www
    environment:
      APP_ENV: local
      APP_DEBUG: true
      KAFKA_BROKER: kafka:9092
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
    networks:
      - backend-network

  analytics-service:
    build:
      context: ./.net-analytics-service
      dockerfile: Dockerfile
    container_name: dotnet-analytics-service
    ports:
      - "8084:8080"
    depends_on:
      kafka:
        condition: service_started
      postgres-analytics:
        condition: service_healthy
    environment:
      #the same secret key as what the user service has
      JWT_SECRET: 2dff20cfbd9ca6d9b17d06bea4904dc985cbca7a97ec73d78a1254dd6ea7ad63b271107bbc3e5f575b294eccc37a985c62f7a58f5f086f35298f9c5a8f35401e
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Postgres: Host=postgres-analytics;Port=5432;Database=analyticsdb;Username=postgres;Password=postgres
      KAFKA_BROKER: kafka:9092
      REDIS_HOST: redis:6379
    networks:
      - backend-network

  react-main-frontend:
    build:
      context: ./react-main-frontend
      dockerfile: Dockerfile
    container_name: react-main-frontend
    ports:
      - "3000:80"
    environment:
      - VITE_PROJECT_VUE_APP_BASE=http://vue-project-frontend:5174
      - VITE_PROJECT_VUE_APP_ENTRY=/src/entry.ts
      - VITE_PROJECT_ANGULAR_APP_BASE=http://angular-analytics-frontend:4200
      - VITE_PROJECT_ANGULAR_APP_ENTRY=/main.js
    depends_on:
      - project-service
      - activity-service
      - analytics-service
    networks:
      - backend-network

  vue-project-frontend:
    build:
      context: ./vue-project-page
      dockerfile: Dockerfile
    container_name: vue-project-frontend
    ports:
      - "5174:5174"
    environment:
      VITE_HOST: 0.0.0.0
      VITE_PORT: 5174
    networks:
      - backend-network

  angular-analytics-frontend:
    build:
      context: ./angular-analytics-page
      dockerfile: Dockerfile
    container_name: angular-analytics-frontend
    ports:
      - "4200:4200"
    networks:
      - backend-network

  postgres-analytics:
    image: postgres:16
    container_name: postgres-analytics
    environment:
      POSTGRES_DB: analyticsdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5436:5432"
    volumes:
      - postgres-analytics-data:/var/lib/postgresql/data
    networks:
      - backend-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d analyticsdb"]
      interval: 5s
      timeout: 5s
      retries: 10

  postgres:
    image: postgres:16
    container_name: postgres
    environment:
      POSTGRES_DB: collaboration_platform
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - backend-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      - backend-network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - backend-network

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 10s
      retries: 10
    networks:
      - backend-network
  
  kafka-init:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    restart: "no"
    entrypoint: ["/bin/sh", "-c"]
    command: >
      echo "Waiting for Kafka..." &&
      sleep 10 &&
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic project.created --partitions 1 --replication-factor 1 &&
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic task.created --partitions 1 --replication-factor 1 &&
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic task.notification.created --partitions 1 --replication-factor 1
    networks:
      - backend-network

networks:
  backend-network:

volumes:
  postgres-data:
  postgres-analytics-data: